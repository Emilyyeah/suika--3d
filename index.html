<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suika / Watermelon Game Clone</title>
  <meta property="og:title" content="Suika / Watermelon Game Clone" />
  <meta property="og:image" content="https://tombofry.github.io/suika-game/screenshot.png" />
  <style>
    @import url(https://fonts.bunny.net/css?family=azeret-mono:400,700,900);

    :root {
      --col-bg: #FFD59D;
      --col-bg-light: #FFDCAE;
      --col-bg-lighter: #FFEEDB;
      --col-primary: #FF5300;
      --col-primary-dark: #FF2700;
      --col-primary-light: #FF8800;
      --col-shadow: rgba(0, 0, 0, 0.25);
      --col-white: #fff;
    }

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      line-height: 1;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: #222;
      font-family: 'Azeret Mono', sans-serif;
    }

    /* 整体手机竖屏容器，居中，最大宽 430px（标准手机宽） */
    #phone-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 430px;
      height: 100%;
      margin: 0 auto;
      background-color: var(--col-bg);
      overflow: hidden;
    }

    /* ── 顶部信息栏 ── */
    #panel-top {
      flex-shrink: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(180deg, #ffecd0 0%, #ffd59d 100%);
      border-bottom: 2px solid rgba(255,140,0,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    /* 左侧：分数区 */
    #panel-score {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .score-label {
      font-size: 12px;
      font-weight: 700;
      color: #b85c00;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 56px;
      font-weight: 900;
      color: var(--col-primary-dark);
      line-height: 1;
      text-shadow: 2px 2px 0 rgba(255,83,0,0.2);
    }

    /* 右侧：NEXT 预览区 */
    #panel-next {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #panel-next .next-label {
      font-size: 11px;
      font-weight: 700;
      color: #b85c00;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #panel-next-fruit-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      border: 2px solid rgba(255,140,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-next-fruit {
      width: 56px;
      height: 56px;
      display: block;
    }

    /* ── 游戏内 UI 覆盖层（仅保留结束弹窗） ── */
    #game-ui {
      position: absolute;
      pointer-events: none;
      user-select: none;
      font-weight: 700;
      display: none;
      transform-origin: top left;
    }

    /* ── 粒子 & 飞字 overlay canvas ── */
    #fx-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 20;
      transform-origin: top left;
    }

    /* ── 大合成特效 overlay ── */
    #big-merge-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
    }
    #big-merge-overlay.show {
      animation: bmo-fade 3.5s ease forwards;
    }
    @keyframes bmo-fade {
      0%   { opacity: 0; }
      8%   { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
    #big-merge-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(255,220,50,0.45) 0%,
        rgba(255,120,0,0.2) 50%,
        transparent 75%);
      animation: bmo-pulse 0.4s ease infinite alternate;
    }
    @keyframes bmo-pulse {
      from { transform: scale(1);    opacity: 0.8; }
      to   { transform: scale(1.06); opacity: 1; }
    }
    #big-merge-rays {
      position: absolute;
      width: 500px;
      height: 500px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: conic-gradient(
        from 0deg,
        transparent 0deg,   rgba(255,220,80,0.35) 10deg,
        transparent 20deg,  rgba(255,220,80,0.35) 30deg,
        transparent 40deg,  rgba(255,220,80,0.35) 50deg,
        transparent 60deg,  rgba(255,220,80,0.35) 70deg,
        transparent 80deg,  rgba(255,220,80,0.35) 90deg,
        transparent 100deg, rgba(255,220,80,0.35) 110deg,
        transparent 120deg, rgba(255,220,80,0.35) 130deg,
        transparent 140deg, rgba(255,220,80,0.35) 150deg,
        transparent 160deg, rgba(255,220,80,0.35) 170deg,
        transparent 180deg, rgba(255,220,80,0.35) 190deg,
        transparent 200deg, rgba(255,220,80,0.35) 210deg,
        transparent 220deg, rgba(255,220,80,0.35) 230deg,
        transparent 240deg, rgba(255,220,80,0.35) 250deg,
        transparent 260deg, rgba(255,220,80,0.35) 270deg,
        transparent 280deg, rgba(255,220,80,0.35) 290deg,
        transparent 300deg, rgba(255,220,80,0.35) 310deg,
        transparent 320deg, rgba(255,220,80,0.35) 330deg,
        transparent 340deg, rgba(255,220,80,0.35) 350deg,
        transparent 360deg
      );
      border-radius: 50%;
      animation: bmo-spin 3s linear infinite;
      z-index: 0;
    }
    @keyframes bmo-spin {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }
    #big-merge-fruit {
      width: 180px; height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(255,200,0,0.9))
              drop-shadow(0 0 48px rgba(255,100,0,0.6));
      position: relative; z-index: 1;
      opacity: 0;
    }
    #big-merge-fruit.show {
      animation: bmo-fruit 3.5s ease forwards;
    }
    @keyframes bmo-fruit {
      0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
      10%  { transform: scale(1.25) rotate(5deg);  opacity: 1; }
      20%  { transform: scale(1.0)  rotate(0deg);  opacity: 1; }
      78%  { transform: scale(1.0)  rotate(0deg);  opacity: 1; }
      100% { transform: scale(1.15) rotate(3deg);  opacity: 0; }
    }
    #big-merge-text {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 3px;
      position: relative; z-index: 1;
      margin-top: 12px;
      -webkit-text-stroke: 4px rgba(0,0,0,0.25);
      opacity: 0;
    }
    #big-merge-text.show {
      animation: bmo-text 3.5s ease forwards;
    }
    @keyframes bmo-text {
      0%   { transform: scale(0.5) translateY(30px);  opacity: 0; }
      12%  { transform: scale(1.15) translateY(0);    opacity: 1; }
      22%  { transform: scale(1.0)  translateY(0);    opacity: 1; }
      78%  { transform: scale(1.0)  translateY(0);    opacity: 1; }
      100% { transform: scale(0.9) translateY(-20px); opacity: 0; }
    }

    /* ── 连击横幅 ── */
    #combo-banner {
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%) scale(0.5);
      transform-origin: center top;
      white-space: nowrap;
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 0 12px #ff8800,
        2px 2px 0 #c85000;
      letter-spacing: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: none;
    }
    #combo-banner.show {
      animation: combo-pop 1.2s ease forwards;
    }
    @keyframes combo-pop {
      0%   { opacity: 1; transform: translateX(-50%) scale(1.3); }
      15%  { transform: translateX(-50%) scale(1.0); }
      70%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) scale(0.9) translateY(-20px); }
    }

    /* ── 死亡线 ── */
    #lose-line {
      position: absolute;
      top: 84px;
      left: 0;
      right: 0;
      height: 2px;
      border-top: 3px dashed rgba(220, 40, 40, 0.75);
      z-index: 10;
    }

    #lose-line-label {
      position: absolute;
      top: -18px;
      left: 8px;
      font-size: 18px;
      font-weight: 900;
      color: rgba(220, 40, 40, 0.85);
      letter-spacing: 1px;
      line-height: 1;
    }

    /* ── 游戏画布区 ── */
    #game-canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
      /* 框边：上下横梁 */
      border-top: 6px solid #c8700a;
      border-bottom: 6px solid #c8700a;
      box-shadow:
        inset 0 4px 8px rgba(0,0,0,0.2),
        inset 0 -4px 8px rgba(0,0,0,0.2);
      background: #e8a050;
    }

    /* 框边左右粗柱 —— 用 game-canvas 的 outline 来做，不占空间 */
    #game-canvas {
      position: relative;
      outline: 8px solid #c8700a;
      outline-offset: 0;
      box-shadow:
        -12px 0 0 0 #b05c00,
         12px 0 0 0 #b05c00,
        -12px 0 16px rgba(0,0,0,0.3),
         12px 0 16px rgba(0,0,0,0.3);
    }

    #game-end-container {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--col-shadow);
    }

    #game-end {
      text-align: center;
      padding: 32px 48px;
      background-color: var(--col-bg-lighter);
      border: 5px solid var(--col-primary);
      box-shadow: 0 4px 32px var(--col-shadow);
      border-radius: 32px;
      margin: 0 auto;
      pointer-events: initial;
      user-select: initial;
    }

    #game-end-title {
      font-weight: 700;
      font-size: 48px;
      color: var(--col-primary-dark);
    }

    #game-end-link {
      display: inline-block;
      color: var(--col-white);
      font-size: 24px;
      text-decoration: none;
      background-color: var(--col-primary-light);
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 4px 4px 0 var(--col-shadow);
    }

    #game-end-link:hover {
      background-color: var(--col-primary);
      box-shadow: 6px 6px 0 var(--col-shadow);
    }

    /* ── 底部图鉴 ── */
    #panel-bottom {
      flex-shrink: 0;
      width: 100%;
      height: 70px;
      background: linear-gradient(180deg, #ffe4b8 0%, #ffd59d 100%);
      border-top: 2px solid rgba(255,140,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #compendium {
      position: relative;
      width: calc(100% - 20px);
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* 长箭头背景 */
    #compendium::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 4px;
      right: 0;
      height: 8px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #f0a030, #e06000);
      border-radius: 2px 0 0 2px;
    }
    /* 箭头头部 */
    #compendium::after {
      content: '';
      position: absolute;
      top: 50%;
      right: -8px;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 14px solid #e06000;
    }

    .compendium-item {
      position: relative;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .compendium-item img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      opacity: 0.3;
      transition: opacity 0.3s;
      display: block;
    }

    .compendium-item.unlocked img {
      opacity: 1;
      filter: drop-shadow(0 0 5px rgba(255,120,0,0.8));
    }
  </style>
</head>
<body>
  <div id="phone-wrap">

    <!-- 顶部信息栏 -->
    <div id="panel-top">

      <!-- 左：分数 -->
      <div id="panel-score">
        <div class="score-label">分数</div>
        <div class="score-value" id="top-score-value">0</div>
      </div>

      <!-- 右：NEXT 预览球 -->
      <div id="panel-next">
        <div class="next-label">下一个</div>
        <div id="panel-next-fruit-wrap">
          <img id="game-next-fruit" src="./assets/img/circle1.png" />
        </div>
      </div>

    </div>

    <!-- 游戏画布区 -->
    <div id="game-canvas-wrap">
      <div id="game-canvas">
        <div id="game-ui">

          <!-- 死亡线 -->
          <div id="lose-line">
            <span id="lose-line-label">游戏结束</span>
          </div>

          <div id="game-end-container">
            <div id="game-end">
              <div id="game-end-title">游戏结束！</div>
              <a id="game-end-link" href="">再来一局</a>
            </div>
          </div>

        </div>
        <!-- 粒子 & 飞字特效层 -->
        <canvas id="fx-canvas"></canvas>
        <!-- 连击横幅 -->
        <div id="combo-banner"></div>
        <!-- 大合成特效 -->
        <div id="big-merge-overlay">
          <div id="big-merge-rays"></div>
          <img id="big-merge-fruit" src="" />
          <div id="big-merge-text"></div>
        </div>
      </div>
    </div>

    <!-- 底部图鉴区 -->
    <div id="panel-bottom">
      <div id="compendium">
        <div class="compendium-item"><img src="./assets/img/circle1.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle2.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle3.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle4.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle5.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle6.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle7.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle8.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle9.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle10.png" /></div>
      </div>
    </div>

  </div>
  <script type="text/javascript" src="./matter.js"></script>
  <script type="text/javascript" src="./index.js?v=14"></script>
</body>
</html>
