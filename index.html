<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>斗罗合成大作战</title>
  <style>
    @import url(https://fonts.bunny.net/css?family=azeret-mono:400,700,900);

    :root {
      --col-bg: #4A5A9A;
      --col-bg-light: #5B6EB0;
      --col-bg-lighter: #6B80C0;
      --col-primary: #C8A050;
      --col-primary-dark: #B08830;
      --col-primary-light: #D4B060;
      --col-shadow: rgba(0, 0, 0, 0.25);
      --col-white: #fff;
    }

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      line-height: 1;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: #1a2040;
      font-family: 'Azeret Mono', sans-serif;
    }

    /* 整体手机竖屏容器 */
    #phone-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 430px;
      height: 100%;
      margin: 0 auto;
      background: url(./assets/img/游戏区域背景430×932@2x.jpg) center/cover no-repeat;
      overflow: hidden;
    }

    /* ── 顶部信息栏 ── */
    #panel-top {
      flex-shrink: 0;
      width: 100%;
      height: 120px;
      background: url(./assets/img/顶栏背景.png) center bottom / 100% auto no-repeat;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      position: relative;
    }

    /* 左侧：返回按钮 */
    #btn-back {
      flex-shrink: 0;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      pointer-events: auto;
      width: 60px;
      height: 30px;
    }
    #btn-back img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* 中间：分数 + 剩余次数 */
    #panel-score {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
    }

    .score-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      letter-spacing: 1px;
    }

    .score-value {
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 20px rgba(100,160,255,0.5), 0 2px 4px rgba(0,0,0,0.3);
    }

    #challenge-count-text {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.5px;
    }

    /* 右侧：NEXT 预览区 */
    #panel-next {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #panel-next .next-label {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      letter-spacing: 2px;
    }

    #panel-next-fruit-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: url(./assets/img/NEXT预览框背景.png) center/contain no-repeat;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-next-fruit {
      width: 50px;
      height: 50px;
      display: block;
    }

    /* ── 游戏内 UI 覆盖层 ── */
    #game-ui {
      position: absolute;
      pointer-events: none;
      user-select: none;
      font-weight: 700;
      display: none;
      transform-origin: top left;
    }

    /* ── 粒子 & 飞字 overlay canvas ── */
    #fx-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 20;
      transform-origin: top left;
    }

    /* ── 大合成特效 overlay ── */
    #big-merge-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
    }
    #big-merge-overlay.show {
      animation: bmo-fade 3.5s ease forwards;
    }
    @keyframes bmo-fade {
      0%   { opacity: 0; }
      8%   { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
    #big-merge-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(100,180,255,0.45) 0%,
        rgba(60,100,200,0.2) 50%,
        transparent 75%);
      animation: bmo-pulse 0.4s ease infinite alternate;
    }
    @keyframes bmo-pulse {
      from { transform: scale(1);    opacity: 0.8; }
      to   { transform: scale(1.06); opacity: 1; }
    }
    #big-merge-rays {
      position: absolute;
      width: 500px;
      height: 500px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: conic-gradient(
        from 0deg,
        transparent 0deg,   rgba(100,180,255,0.35) 10deg,
        transparent 20deg,  rgba(200,180,100,0.35) 30deg,
        transparent 40deg,  rgba(100,180,255,0.35) 50deg,
        transparent 60deg,  rgba(200,180,100,0.35) 70deg,
        transparent 80deg,  rgba(100,180,255,0.35) 90deg,
        transparent 100deg, rgba(200,180,100,0.35) 110deg,
        transparent 120deg, rgba(100,180,255,0.35) 130deg,
        transparent 140deg, rgba(200,180,100,0.35) 150deg,
        transparent 160deg, rgba(100,180,255,0.35) 170deg,
        transparent 180deg, rgba(200,180,100,0.35) 190deg,
        transparent 200deg, rgba(100,180,255,0.35) 210deg,
        transparent 220deg, rgba(200,180,100,0.35) 230deg,
        transparent 240deg, rgba(100,180,255,0.35) 250deg,
        transparent 260deg, rgba(200,180,100,0.35) 270deg,
        transparent 280deg, rgba(100,180,255,0.35) 290deg,
        transparent 300deg, rgba(200,180,100,0.35) 310deg,
        transparent 320deg, rgba(100,180,255,0.35) 330deg,
        transparent 340deg, rgba(200,180,100,0.35) 350deg,
        transparent 360deg
      );
      border-radius: 50%;
      animation: bmo-spin 3s linear infinite;
      z-index: 0;
    }
    @keyframes bmo-spin {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }
    #big-merge-fruit {
      width: 180px; height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(100,180,255,0.9))
              drop-shadow(0 0 48px rgba(60,100,200,0.6));
      position: relative; z-index: 1;
      opacity: 0;
    }
    #big-merge-fruit.show {
      animation: bmo-fruit 3.5s ease forwards;
    }
    @keyframes bmo-fruit {
      0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
      10%  { transform: scale(1.25) rotate(5deg);  opacity: 1; }
      20%  { transform: scale(1.0)  rotate(0deg);  opacity: 1; }
      78%  { transform: scale(1.0)  rotate(0deg);  opacity: 1; }
      100% { transform: scale(1.15) rotate(3deg);  opacity: 0; }
    }
    #big-merge-text {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 3px;
      position: relative; z-index: 1;
      margin-top: 12px;
      -webkit-text-stroke: 4px rgba(0,0,0,0.25);
      opacity: 0;
    }
    #big-merge-text.show {
      animation: bmo-text 3.5s ease forwards;
    }
    @keyframes bmo-text {
      0%   { transform: scale(0.5) translateY(30px);  opacity: 0; }
      12%  { transform: scale(1.15) translateY(0);    opacity: 1; }
      22%  { transform: scale(1.0)  translateY(0);    opacity: 1; }
      78%  { transform: scale(1.0)  translateY(0);    opacity: 1; }
      100% { transform: scale(0.9) translateY(-20px); opacity: 0; }
    }

    /* ── 连击横幅 ── */
    #combo-banner {
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%) scale(0.5);
      transform-origin: center top;
      white-space: nowrap;
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 0 12px #4488ff,
        0 0 24px #2255cc,
        2px 2px 0 #223388;
      letter-spacing: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: none;
    }
    #combo-banner.show {
      animation: combo-pop 1.2s ease forwards;
    }
    @keyframes combo-pop {
      0%   { opacity: 1; transform: translateX(-50%) scale(1.3); }
      15%  { transform: translateX(-50%) scale(1.0); }
      70%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) scale(0.9) translateY(-20px); }
    }

    /* ── 死亡线 ── */
    #lose-line {
      position: absolute;
      top: 80px;
      left: 0;
      right: 0;
      height: 10px;
      background: url(./assets/img/死亡线.png) center/100% 100% no-repeat;
      border: none;
      z-index: 10;
    }

    #lose-line-label {
      position: absolute;
      top: -14px;
      left: 8px;
      width: 60px;
      height: 18px;
      background: url(./assets/img/死亡线标签.png) left center/contain no-repeat;
      font-size: 0;
      color: transparent;
      line-height: 1;
    }

    /* ── 游戏画布区 ── */
    #game-canvas-wrap {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
      border: none;
      box-shadow: none;
      background: transparent; /* 游戏中由JS切换 */
      padding-top: 0;
    }

    #game-canvas {
      position: relative;
      outline: none;
      box-shadow: none;
    }

    /* ── 通用弹窗样式 ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
    }
    .modal-overlay.show { display: flex; }

    .modal-box {
      position: relative;
      background: url(./assets/img/弹窗背景板.png) center/contain no-repeat;
      border: none;
      border-radius: 0;
      padding: 40px 36px 36px;
      text-align: center;
      width: 290px;
      min-height: 400px;
      box-shadow: none;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .modal-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      width: 100%;
      justify-content: center;
    }
    /* 图片按钮通用 */
    .modal-btn {
      width: 120px;
      height: 40px;
      border-radius: 8px;
      font-size: 0;
      color: transparent;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: transparent;
    }
    .modal-btn-secondary {
      background-image: url(./assets/img/继续游戏.png);
    }
    .modal-btn-primary {
      background-image: url(./assets/img/再来一局.png);
    }
    .modal-btn-primary:hover { opacity: 0.9; }
    .modal-btn-secondary:hover { opacity: 0.9; }

    /* 退出弹窗专用按钮覆盖 */
    #quit-confirm {
      background-image: url(./assets/img/确认退出.png);
    }

    /* 游戏结束弹窗：得分区 */
    #game-end-score-wrap {
      margin: 6px 0 0;
    }
    #game-end-score-label {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
    }
    #game-end-score-value {
      font-size: 48px;
      font-weight: 900;
      color: #fff;
      line-height: 1.15;
      text-shadow: 0 0 16px rgba(100,160,255,0.5), 0 2px 4px rgba(0,0,0,0.3);
    }
    #game-end-total-wrap {
      margin: 10px 0 0;
      padding-top: 10px;
      border-top: 1px dashed rgba(255,255,255,0.2);
    }
    #game-end-total-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
    }
    #game-end-total-value {
      font-size: 32px;
      font-weight: 900;
      color: rgba(255,255,255,0.9);
      line-height: 1.2;
    }
    #game-end-settling {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-top: 6px;
    }

    /* 返回按钮样式（弹窗内） */
    #game-end-back-link,
    #game-end-back-link2,
    #game-end-back-link3 {
      background-image: url(./assets/img/返回.png);
    }

    /* ── 退出确认弹窗 ── */
    #quit-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
    }
    #quit-modal.show { display: flex; }

    /* ── 菜单覆盖层 ── */
    #menu-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      z-index: 100;
      padding-bottom: 108px;
    }

    #btn-start-disabled {
      pointer-events: auto;
      display: none;
      width: 220px;
      height: 60px;
      background: rgba(40,40,60,0.75);
      border-radius: 16px;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      font-family: 'Azeret Mono', sans-serif;
      cursor: not-allowed;
    }

    /* ── 底部图鉴区 ── */
    #panel-bottom {
      flex-shrink: 0;
      width: 100%;
      height: 70px;
      background: url(./assets/img/图鉴栏背景.png) center/cover no-repeat;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #compendium {
      position: relative;
      width: 100%; padding: 0 4px; box-sizing: border-box;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* 进度箭头背景 */
    #compendium::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 4px;
      right: 0;
      height: 10px;
      transform: translateY(-50%);
      background: url(./assets/img/图鉴进度箭头.png) left center/100% auto no-repeat;
    }
    /* 不需要箭头头部（图片自带） */
    #compendium::after {
      content: none;
    }

    .compendium-item {
      position: relative;
      max-width: 43px;
      aspect-ratio: 1;
      flex: 1 1 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .compendium-item img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      opacity: 0.3;
      transition: opacity 0.3s;
      display: block;
    }

    .compendium-item.unlocked img {
      opacity: 1;
      filter: drop-shadow(0 0 5px rgba(100,180,255,0.8));
    }
    /* ── 菜单标题（HTML层，独立于画布） ── */
    #menu-title {
      position: absolute;
      top: 4%;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: auto;
      z-index: 110;
      pointer-events: none;
    }

    /* ── 开始按钮（HTML层，独立于画布） ── */
    #btn-start-html {
      position: absolute;
      bottom: 2%;
      left: 50%;
      transform: translateX(-50%);
      width: 65%;
      height: auto;
      z-index: 110;
      cursor: pointer;
    }
    #btn-start-html:hover { opacity: 0.9; }
    #btn-start-html.hidden { display: none; }

    /* ── 菜单合图 ── */
    #menu-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      height: auto;
      z-index: 105;
      pointer-events: none;
    }
    #menu-bg.hidden { display: none; }

  </style>
</head>
<body>
  <div id="phone-wrap">

    <!-- 顶部信息栏 -->
    <div id="panel-top">

      <!-- 左：返回按钮 -->
      <button id="btn-back"><img src="./assets/img/返回.png" alt="返回" /></button>

      <!-- 中：分数 + 剩余次数 -->
      <div id="panel-score">
        <div class="score-label">分数</div>
        <div class="score-value" id="top-score-value">0</div>
        <div id="challenge-count-text">剩余次数：<span id="challenge-count-num">3</span> 次</div>
      </div>

      <!-- 右：NEXT 预览球 -->
      <div id="panel-next">
        <div class="next-label">下一个</div>
        <div id="panel-next-fruit-wrap">
          <img id="game-next-fruit" src="./assets/img/circle1.png" />
        </div>
      </div>

    </div>

    <!-- 游戏画布区 -->
    <div id="game-canvas-wrap">
      <!-- 标题（HTML层，画布外） -->
      <img id="menu-title" src="./assets/img/标题.png" />
      <!-- 开始按钮（HTML层，画布外） -->
      <img id="btn-start-html" src="./assets/img/开始游戏按钮.png" />
      <!-- 菜单合图（HTML层，画布外） -->
      <img id="menu-bg" src="./assets/img/bg_menu.png" />
      <div id="game-canvas">
        <div id="game-ui">

          <!-- 死亡线 -->
          <div id="lose-line">
            <span id="lose-line-label">危险</span>
          </div>

        </div>

        <!-- 菜单覆盖层 -->
        <div id="menu-overlay">
          <div id="btn-start-disabled">开始游戏</div>
        </div>

        <!-- 粒子 & 飞字特效层 -->
        <canvas id="fx-canvas"></canvas>
        <!-- 连击横幅 -->
        <div id="combo-banner"></div>
        <!-- 大合成特效 -->
        <div id="big-merge-overlay">
          <div id="big-merge-rays"></div>
          <img id="big-merge-fruit" src="" />
          <div id="big-merge-text"></div>
        </div>
      </div>
    </div>

    <!-- 底部图鉴区 -->
    <div id="panel-bottom">
      <div id="compendium">
        <div class="compendium-item"><img src="./assets/img/circle1.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle2.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle3.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle4.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle5.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle6.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle7.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle8.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle9.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle10.png" /></div>
      </div>
    </div>

  </div>

  <!-- 游戏结束弹窗 -->
  <div id="game-end-container" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">游戏结束！</div>
      <div id="game-end-score-wrap">
        <div id="game-end-score-label">本轮获得积分</div>
        <div id="game-end-score-value">0</div>
      </div>
      <div id="game-end-total-wrap">
        <div id="game-end-total-label">当前累计积分</div>
        <div id="game-end-total-value">0</div>
      </div>
      <div id="game-end-settling" style="display:none;">结算中...</div>
      <div id="game-end-has-chance" class="modal-btns" style="display:none;">
        <a id="game-end-back-link" href="" class="modal-btn modal-btn-secondary">返回</a>
        <a id="game-end-link" href="" class="modal-btn modal-btn-primary">再来一局</a>
      </div>
      <div id="game-end-no-chance" style="display:none;">
        <div class="modal-desc" style="margin-top:8px;margin-bottom:0;">挑战次数已用完</div>
        <div class="modal-btns">
          <a id="game-end-back-link2" href="" class="modal-btn modal-btn-primary">返回</a>
        </div>
      </div>
      <div id="game-end-error" style="display:none;">
        <div class="modal-btns">
          <a id="game-end-back-link3" href="" class="modal-btn modal-btn-secondary">返回</a>
          <a id="game-end-retry-link" href="" class="modal-btn modal-btn-primary">再来一局</a>
        </div>
      </div>
    </div>
  </div>

  <!-- 退出确认弹窗 -->
  <div id="quit-modal">
    <div class="modal-box">
      <div class="modal-title">确认结束游戏？</div>
      <div class="modal-desc">游戏将直接结束，<br>以当前得分计入本局。</div>
