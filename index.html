<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suika / Watermelon Game Clone</title>
  <meta property="og:title" content="Suika / Watermelon Game Clone" />
  <meta property="og:image" content="https://tombofry.github.io/suika-game/screenshot.png" />
  <style>
    @import url(https://fonts.bunny.net/css?family=azeret-mono:400,700,900);

    :root {
      --col-bg: #FFD59D;
      --col-bg-light: #FFDCAE;
      --col-bg-lighter: #FFEEDB;
      --col-primary: #FF5300;
      --col-primary-dark: #FF2700;
      --col-primary-light: #FF8800;
      --col-shadow: rgba(0, 0, 0, 0.25);
      --col-white: #fff;
    }

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      line-height: 1;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: #222;
      font-family: 'Azeret Mono', sans-serif;
    }

    /* 整体手机竖屏容器，居中，最大宽 430px（标准手机宽） */
    #phone-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 430px;
      height: 100%;
      margin: 0 auto;
      background-color: var(--col-bg);
      overflow: hidden;
    }

    /* ── 顶部信息栏 ── */
    #panel-top {
      flex-shrink: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(180deg, #ffecd0 0%, #ffd59d 100%);
      border-bottom: 2px solid rgba(255,140,0,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: relative;
    }

    /* 左侧：返回按钮 */
    #btn-back {
      flex-shrink: 0;
      background: rgba(255,255,255,0.85);
      border: 2px solid #c8700a;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #c8700a;
      cursor: pointer;
      font-family: 'Azeret Mono', sans-serif;
      pointer-events: auto;
    }
    #btn-back:hover { background: #fff; }

    /* 中间：分数 + 剩余次数 */
    #panel-score {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
    }

    .score-label {
      font-size: 12px;
      font-weight: 700;
      color: #b85c00;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 52px;
      font-weight: 900;
      color: var(--col-primary-dark);
      line-height: 1;
      text-shadow: 2px 2px 0 rgba(255,83,0,0.2);
    }

    #challenge-count-text {
      font-size: 12px;
      font-weight: 700;
      color: #b85c00;
      letter-spacing: 0.5px;
    }

    /* 右侧：NEXT 预览区 */
    #panel-next {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #panel-next .next-label {
      font-size: 11px;
      font-weight: 700;
      color: #b85c00;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #panel-next-fruit-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      border: 2px solid rgba(255,140,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-next-fruit {
      width: 50px;
      height: 50px;
      display: block;
    }

    /* ── 游戏内 UI 覆盖层（仅保留结束弹窗） ── */
    #game-ui {
      position: absolute;
      pointer-events: none;
      user-select: none;
      font-weight: 700;
      display: none;
      transform-origin: top left;
    }

    /* ── 粒子 & 飞字 overlay canvas ── */
    #fx-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 20;
      transform-origin: top left;
    }

    /* ── 大合成特效 overlay ── */
    #big-merge-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
    }
    #big-merge-overlay.show {
      animation: bmo-fade 3.5s ease forwards;
    }
    @keyframes bmo-fade {
      0%   { opacity: 0; }
      8%   { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
    #big-merge-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(255,220,50,0.45) 0%,
        rgba(255,120,0,0.2) 50%,
        transparent 75%);
      animation: bmo-pulse 0.4s ease infinite alternate;
    }
    @keyframes bmo-pulse {
      from { transform: scale(1);    opacity: 0.8; }
      to   { transform: scale(1.06); opacity: 1; }
    }
    #big-merge-rays {
      position: absolute;
      width: 500px;
      height: 500px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: conic-gradient(
        from 0deg,
        transparent 0deg,   rgba(255,220,80,0.35) 10deg,
        transparent 20deg,  rgba(255,220,80,0.35) 30deg,
        transparent 40deg,  rgba(255,220,80,0.35) 50deg,
        transparent 60deg,  rgba(255,220,80,0.35) 70deg,
        transparent 80deg,  rgba(255,220,80,0.35) 90deg,
        transparent 100deg, rgba(255,220,80,0.35) 110deg,
        transparent 120deg, rgba(255,220,80,0.35) 130deg,
        transparent 140deg, rgba(255,220,80,0.35) 150deg,
        transparent 160deg, rgba(255,220,80,0.35) 170deg,
        transparent 180deg, rgba(255,220,80,0.35) 190deg,
        transparent 200deg, rgba(255,220,80,0.35) 210deg,
        transparent 220deg, rgba(255,220,80,0.35) 230deg,
        transparent 240deg, rgba(255,220,80,0.35) 250deg,
        transparent 260deg, rgba(255,220,80,0.35) 270deg,
        transparent 280deg, rgba(255,220,80,0.35) 290deg,
        transparent 300deg, rgba(255,220,80,0.35) 310deg,
        transparent 320deg, rgba(255,220,80,0.35) 330deg,
        transparent 340deg, rgba(255,220,80,0.35) 350deg,
        transparent 360deg
      );
      border-radius: 50%;
      animation: bmo-spin 3s linear infinite;
      z-index: 0;
    }
    @keyframes bmo-spin {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }
    #big-merge-fruit {
      width: 180px; height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(255,200,0,0.9))
              drop-shadow(0 0 48px rgba(255,100,0,0.6));
      position: relative; z-index: 1;
      opacity: 0;
    }
    #big-merge-fruit.show {
      animation: bmo-fruit 3.5s ease forwards;
    }
    @keyframes bmo-fruit {
      0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
      10%  { transform: scale(1.25) rotate(5deg);  opacity: 1; }
      20%  { transform: scale(1.0)  rotate(0deg);  opacity: 1; }
      78%  { transform: scale(1.0)  rotate(0deg);  opacity: 1; }
      100% { transform: scale(1.15) rotate(3deg);  opacity: 0; }
    }
    #big-merge-text {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 3px;
      position: relative; z-index: 1;
      margin-top: 12px;
      -webkit-text-stroke: 4px rgba(0,0,0,0.25);
      opacity: 0;
    }
    #big-merge-text.show {
      animation: bmo-text 3.5s ease forwards;
    }
    @keyframes bmo-text {
      0%   { transform: scale(0.5) translateY(30px);  opacity: 0; }
      12%  { transform: scale(1.15) translateY(0);    opacity: 1; }
      22%  { transform: scale(1.0)  translateY(0);    opacity: 1; }
      78%  { transform: scale(1.0)  translateY(0);    opacity: 1; }
      100% { transform: scale(0.9) translateY(-20px); opacity: 0; }
    }

    /* ── 连击横幅 ── */
    #combo-banner {
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%) scale(0.5);
      transform-origin: center top;
      white-space: nowrap;
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 0 12px #ff8800,
        2px 2px 0 #c85000;
      letter-spacing: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: none;
    }
    #combo-banner.show {
      animation: combo-pop 1.2s ease forwards;
    }
    @keyframes combo-pop {
      0%   { opacity: 1; transform: translateX(-50%) scale(1.3); }
      15%  { transform: translateX(-50%) scale(1.0); }
      70%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) scale(0.9) translateY(-20px); }
    }

    /* ── 死亡线 ── */
    #lose-line {
      position: absolute;
      top: 84px;
      left: 0;
      right: 0;
      height: 2px;
      border-top: 3px dashed rgba(220, 40, 40, 0.75);
      z-index: 10;
    }

    #lose-line-label {
      position: absolute;
      top: -18px;
      left: 8px;
      font-size: 18px;
      font-weight: 900;
      color: rgba(220, 40, 40, 0.85);
      letter-spacing: 1px;
      line-height: 1;
    }

    /* ── 游戏画布区 ── */
    #game-canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
      /* 框边：上下横梁 */
      border-top: 6px solid #c8700a;
      border-bottom: 6px solid #c8700a;
      box-shadow:
        inset 0 4px 8px rgba(0,0,0,0.2),
        inset 0 -4px 8px rgba(0,0,0,0.2);
      background: #e8a050;
    }

    /* 框边左右粗柱 —— 用 game-canvas 的 outline 来做，不占空间 */
    #game-canvas {
      position: relative;
      outline: 8px solid #c8700a;
      outline-offset: 0;
      box-shadow:
        -12px 0 0 0 #b05c00,
         12px 0 0 0 #b05c00,
        -12px 0 16px rgba(0,0,0,0.3),
         12px 0 16px rgba(0,0,0,0.3);
    }

    /* ── 通用弹窗样式（所有弹窗完全一致的尺寸和外观） ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
    }
    .modal-overlay.show { display: flex; }

    .modal-box {
      position: relative;
      background: #FFEEDB;
      border: 4px solid var(--col-primary);
      border-radius: 24px;
      padding: 28px 24px 24px;
      text-align: center;
      width: 280px;           /* 固定宽度，所有弹窗一致 */
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      box-sizing: border-box;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 900;
      color: var(--col-primary-dark);
      margin-bottom: 8px;
    }
    .modal-desc {
      font-size: 13px;
      color: #a06030;
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-btn {
      flex: 1;
      padding: 13px 0;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Azeret Mono', sans-serif;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .modal-btn-secondary {
      background: #fff;
      color: var(--col-primary);
      border: 2px solid var(--col-primary-light);
    }
    .modal-btn-primary {
      background: var(--col-primary-light);
      color: #fff;
      box-shadow: 0 3px 0 #c85000;
    }
    .modal-btn-primary:hover { background: var(--col-primary); }
    .modal-btn-secondary:hover { background: #fff5e8; }

    /* 游戏结束弹窗：得分区 */
    #game-end-score-wrap {
      margin: 6px 0 0;
    }
    #game-end-score-label {
      font-size: 13px;
      font-weight: 700;
      color: #b85c00;
    }
    #game-end-score-value {
      font-size: 48px;
      font-weight: 900;
      color: var(--col-primary-dark);
      line-height: 1.15;
      text-shadow: 2px 2px 0 rgba(255,83,0,0.15);
    }

    /* ── 退出确认弹窗 ── */
    #quit-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
    }
    #quit-modal.show { display: flex; }

    /* ── 菜单覆盖层（次数=0时置灰开始按钮） ── */
    #menu-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      z-index: 100;
      padding-bottom: 108px; /* 对齐 Matter.js 开始按钮 */
    }

    /* 次数=0 时开始按钮遮罩 */
    #btn-start-disabled {
      pointer-events: auto;
      display: none;
      width: 220px;
      height: 60px;
      background: rgba(80,80,80,0.75);
      border-radius: 16px;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      font-family: 'Azeret Mono', sans-serif;
      cursor: not-allowed;
    }
    #panel-bottom {
      flex-shrink: 0;
      width: 100%;
      height: 70px;
      background: linear-gradient(180deg, #ffe4b8 0%, #ffd59d 100%);
      border-top: 2px solid rgba(255,140,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #compendium {
      position: relative;
      width: calc(100% - 20px);
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* 长箭头背景 */
    #compendium::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 4px;
      right: 0;
      height: 8px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #f0a030, #e06000);
      border-radius: 2px 0 0 2px;
    }
    /* 箭头头部 */
    #compendium::after {
      content: '';
      position: absolute;
      top: 50%;
      right: -8px;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 14px solid #e06000;
    }

    .compendium-item {
      position: relative;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .compendium-item img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      opacity: 0.3;
      transition: opacity 0.3s;
      display: block;
    }

    .compendium-item.unlocked img {
      opacity: 1;
      filter: drop-shadow(0 0 5px rgba(255,120,0,0.8));
    }
  </style>
</head>
<body>
  <div id="phone-wrap">

    <!-- 顶部信息栏 -->
    <div id="panel-top">

      <!-- 左：返回按钮 -->
      <button id="btn-back">← 返回</button>

      <!-- 中：分数 + 剩余次数 -->
      <div id="panel-score">
        <div class="score-label">分数</div>
        <div class="score-value" id="top-score-value">0</div>
        <div id="challenge-count-text">剩余次数：<span id="challenge-count-num">3</span> 次</div>
      </div>

      <!-- 右：NEXT 预览球 -->
      <div id="panel-next">
        <div class="next-label">下一个</div>
        <div id="panel-next-fruit-wrap">
          <img id="game-next-fruit" src="./assets/img/circle1.png" />
        </div>
      </div>

    </div>

    <!-- 游戏画布区 -->
    <div id="game-canvas-wrap">
      <div id="game-canvas">
        <div id="game-ui">

          <!-- 死亡线 -->
          <div id="lose-line">
            <span id="lose-line-label">游戏结束</span>
          </div>

        </div>

        <!-- 菜单覆盖层（次数=0时遮住开始按钮） -->
        <div id="menu-overlay">
          <div id="btn-start-disabled">开始游戏</div>
        </div>

        <!-- 粒子 & 飞字特效层 -->
        <canvas id="fx-canvas"></canvas>
        <!-- 连击横幅 -->
        <div id="combo-banner"></div>
        <!-- 大合成特效 -->
        <div id="big-merge-overlay">
          <div id="big-merge-rays"></div>
          <img id="big-merge-fruit" src="" />
          <div id="big-merge-text"></div>
        </div>
      </div>
    </div>

    <!-- 底部图鉴区 -->
    <div id="panel-bottom">
      <div id="compendium">
        <div class="compendium-item"><img src="./assets/img/circle1.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle2.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle3.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle4.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle5.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle6.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle7.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle8.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle9.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle10.png" /></div>
      </div>
    </div>

  </div>
  </div>

  <!-- 游戏结束弹窗 -->
  <div id="game-end-container" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">游戏结束！</div>
      <div id="game-end-score-wrap">
        <div id="game-end-score-label">本局得分</div>
        <div id="game-end-score-value">0</div>
      </div>
      <div id="game-end-has-chance" class="modal-btns" style="display:none;">
        <a id="game-end-back-link" href="" class="modal-btn modal-btn-secondary">返回</a>
        <a id="game-end-link" href="" class="modal-btn modal-btn-primary">再来一局</a>
      </div>
      <div id="game-end-no-chance" style="display:none;">
        <div class="modal-desc" style="margin-top:8px;margin-bottom:0;">挑战次数已用完</div>
        <div class="modal-btns">
          <a id="game-end-back-link2" href="" class="modal-btn modal-btn-primary">返回</a>
        </div>
      </div>
    </div>
  </div>

  <!-- 退出确认弹窗 -->
  <div id="quit-modal">
    <div class="modal-box">
      <div class="modal-title">确认结束游戏？</div>
      <div class="modal-desc">游戏将直接结束，<br>以当前得分计入本局。</div>
      <div class="modal-btns">
        <button id="quit-cancel" class="modal-btn modal-btn-secondary">继续游戏</button>
        <button id="quit-confirm" class="modal-btn modal-btn-primary">确认退出</button>
      </div>
    </div>
  </div>

  <script type="text/javascript" src="./matter.js"></script>
  <script type="text/javascript" src="./index.js?v=33"></script>
</body>
</html>
