<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suika / Watermelon Game Clone</title>
  <meta property="og:title" content="Suika / Watermelon Game Clone" />
  <meta property="og:image" content="https://tombofry.github.io/suika-game/screenshot.png" />
  <style>
    @import url(https://fonts.bunny.net/css?family=azeret-mono:400,700,900);

    :root {
      --col-bg: #FFD59D;
      --col-bg-light: #FFDCAE;
      --col-bg-lighter: #FFEEDB;
      --col-primary: #FF5300;
      --col-primary-dark: #FF2700;
      --col-primary-light: #FF8800;
      --col-shadow: rgba(0, 0, 0, 0.25);
      --col-white: #fff;
    }

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      line-height: 1;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: #222;
      font-family: 'Azeret Mono', sans-serif;
    }

    /* 整体手机竖屏容器，居中，最大宽 430px（标准手机宽） */
    #phone-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 430px;
      height: 100%;
      margin: 0 auto;
      background-color: var(--col-bg);
      overflow: hidden;
    }

    /* ── 顶部信息栏 ── */
    #panel-top {
      flex-shrink: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(180deg, #ffecd0 0%, #ffd59d 100%);
      border-bottom: 2px solid rgba(255,140,0,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    /* 左侧：分数区 */
    #panel-score {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .score-label {
      font-size: 12px;
      font-weight: 700;
      color: #b85c00;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 56px;
      font-weight: 900;
      color: var(--col-primary-dark);
      line-height: 1;
      text-shadow: 2px 2px 0 rgba(255,83,0,0.2);
    }

    /* 右侧：NEXT 预览区 */
    #panel-next {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #panel-next .next-label {
      font-size: 11px;
      font-weight: 700;
      color: #b85c00;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #panel-next-fruit-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      border: 2px solid rgba(255,140,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-next-fruit {
      width: 56px;
      height: 56px;
      display: block;
    }

    /* ── 底部装饰区 ── */
    /* ── 游戏内 UI 覆盖层（仅保留结束弹窗） ── */
    #game-ui {
      position: absolute;
      pointer-events: none;
      user-select: none;
      font-weight: 700;
      display: none;
      transform-origin: top left;
    }

    /* ── 死亡线 ── */
    #lose-line {
      position: absolute;
      top: 84px;
      left: 0;
      right: 0;
      height: 2px;
      border-top: 3px dashed rgba(220, 40, 40, 0.75);
      z-index: 10;
    }

    #lose-line-label {
      position: absolute;
      top: -18px;
      left: 8px;
      font-size: 18px;
      font-weight: 900;
      color: rgba(220, 40, 40, 0.85);
      letter-spacing: 1px;
      line-height: 1;
    }

    /* ── 游戏画布区 ── */
    #game-canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
      /* 框边：上下横梁 */
      border-top: 6px solid #c8700a;
      border-bottom: 6px solid #c8700a;
      box-shadow:
        inset 0 4px 8px rgba(0,0,0,0.2),
        inset 0 -4px 8px rgba(0,0,0,0.2);
      background: #e8a050;
    }

    /* 框边左右粗柱 —— 用 game-canvas 的 outline 来做，不占空间 */
    #game-canvas {
      position: relative;
      outline: 8px solid #c8700a;
      outline-offset: 0;
      box-shadow:
        -12px 0 0 0 #b05c00,
         12px 0 0 0 #b05c00,
        -12px 0 16px rgba(0,0,0,0.3),
         12px 0 16px rgba(0,0,0,0.3);
    }

    #game-end-container {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--col-shadow);
    }

    #game-end {
      text-align: center;
      padding: 32px 48px;
      background-color: var(--col-bg-lighter);
      border: 5px solid var(--col-primary);
      box-shadow: 0 4px 32px var(--col-shadow);
      border-radius: 32px;
      margin: 0 auto;
      pointer-events: initial;
      user-select: initial;
    }

    #game-end-title {
      font-weight: 700;
      font-size: 48px;
      color: var(--col-primary-dark);
    }

    #game-end-link {
      display: inline-block;
      color: var(--col-white);
      font-size: 24px;
      text-decoration: none;
      background-color: var(--col-primary-light);
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 4px 4px 0 var(--col-shadow);
    }

    #game-end-link:hover {
      background-color: var(--col-primary);
      box-shadow: 6px 6px 0 var(--col-shadow);
    }

    #game-next-fruit {
      width: 56px;
      height: 56px;
      display: block;
    }

    /* ── 底部图鉴 ── */
    #panel-bottom {
      flex-shrink: 0;
      width: 100%;
      height: 70px;
      background: linear-gradient(180deg, #ffe4b8 0%, #ffd59d 100%);
      border-top: 2px solid rgba(255,140,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #compendium {
      position: relative;
      width: calc(100% - 20px);
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* 长箭头背景 */
    #compendium::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 4px;
      right: 0;
      height: 8px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #f0a030, #e06000);
      border-radius: 2px 0 0 2px;
    }
    /* 箭头头部 */
    #compendium::after {
      content: '';
      position: absolute;
      top: 50%;
      right: -8px;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 14px solid #e06000;
    }

    .compendium-item {
      position: relative;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .compendium-item img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      opacity: 0.3;
      transition: opacity 0.3s;
      display: block;
    }

    .compendium-item.unlocked img {
      opacity: 1;
      filter: drop-shadow(0 0 5px rgba(255,120,0,0.8));
    }
  </style>
</head>
<body>
  <div id="phone-wrap">

    <!-- 顶部信息栏 -->
    <div id="panel-top">

      <!-- 左：分数 -->
      <div id="panel-score">
        <div class="score-label">分数</div>
        <div class="score-value" id="top-score-value">0</div>
      </div>

      <!-- 右：NEXT 预览球 -->
      <div id="panel-next">
        <div class="next-label">NEXT</div>
        <div id="panel-next-fruit-wrap">
          <img id="game-next-fruit" src="./assets/img/circle0.png" />
        </div>
      </div>

    </div>

    <!-- 游戏画布区 -->
    <div id="game-canvas-wrap">
      <div id="game-canvas">
        <div id="game-ui">

          <!-- 死亡线 -->
          <div id="lose-line">
            <span id="lose-line-label">GAME OVER</span>
          </div>

          <div id="game-end-container">
            <div id="game-end">
              <div id="game-end-title">Game Over!</div>
              <a id="game-end-link" href="">Try Again</a>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- 底部图鉴区 -->
    <div id="panel-bottom">
      <div id="compendium">
        <div class="compendium-item"><img src="./assets/img/circle0.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle1.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle2.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle3.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle4.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle5.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle6.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle7.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle8.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle9.png" /></div>
        <div class="compendium-item"><img src="./assets/img/circle10.png" /></div>
      </div>
    </div>

  </div>
  <script type="text/javascript" src="./matter.js"></script>
  <script type="text/javascript" src="./index.js?v=13"></script>
</body>
</html>
